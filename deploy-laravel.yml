---
- name: Deploy Laravel App on EC2
  hosts: ec2
  become: yes

  vars:
    app_path: /var/www/laravel
    repo_url: https://github.com/laravel/laravel.git
    repo_branch: master
    ansible_remote_tmp: /tmp/.ansible/tmp

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - apache2
          - git
          - php8.5
          - php8.5-cli
          - php8.5-mbstring
          - php8.5-xml
          - php8.5-curl
          - php8.5-mysql
          - php8.5-sqlite3
          - libapache2-mod-php8.5
          - composer
          - unzip
          - acl
        state: present

    - name: Mark laravel directory as safe for git
      command: git config --global --add safe.directory /var/www/laravel
      changed_when: false

    - name: Clone Laravel repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_path }}"
        version: "{{ repo_branch }}"
        force: yes

    - name: Set directory ownership
      file:
        path: "{{ app_path }}"
        owner: www-data
        group: www-data
        recurse: yes

    - name: Set storage and cache writable
      file:
        path: "{{ item }}"
        mode: "0775"
        recurse: yes
      loop:
        - "{{ app_path }}/storage"
        - "{{ app_path }}/bootstrap/cache"

    - name: Copy .env file
      copy:
        src: "{{ app_path }}/.env.example"
        dest: "{{ app_path }}/.env"
        remote_src: yes
        force: no

    - name: Install composer dependencies
      shell: composer install --no-interaction --prefer-dist
      args:
        chdir: "{{ app_path }}"
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"

    - name: Generate Laravel app key
      command: php artisan key:generate
      args:
        chdir: "{{ app_path }}"

    - name: Configure Apache virtual host
      copy:
        dest: /etc/apache2/sites-available/laravel.conf
        content: |
          <VirtualHost *:80>
              ServerAdmin admin@localhost
              DocumentRoot /var/www/laravel/public

              <Directory /var/www/laravel/public>
                  AllowOverride All
                  Require all granted
              </Directory>

              ErrorLog ${APACHE_LOG_DIR}/laravel_error.log
              CustomLog ${APACHE_LOG_DIR}/laravel_access.log combined
          </VirtualHost>

    - name: Enable Laravel site
      command: a2ensite laravel.conf

    - name: Enable mod_rewrite
      command: a2enmod rewrite

    - name: Disable default Apache site
      command: a2dissite 000-default.conf

    - name: Create SQLite database file
      file:
        path: "{{ app_path }}/database/database.sqlite"
        state: touch
        owner: www-data
        group: www-data
        mode: "0664"

    - name: Run Laravel migrations
      shell: php artisan migrate --force
      args:
        chdir: "{{ app_path }}"
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"

    - name: Restart Apache
      systemd:
        name: apache2
        state: restarted

    - name: Send Discord notification
      uri:
        url: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
        method: POST
        body_format: json
        body:
          content: ""
          embeds:
            - title: "✅ Deploy Successful"
              color: 3066993
              fields:
                - name: "Project"
                  value: "Laravel EC2"
                  inline: true
                - name: "Server"
                  value: "52.221.230.166"
                  inline: true
                - name: "Branch"
                  value: "{{ repo_branch }}"
                  inline: true
                - name: "Status"
                  value: "SUCCESS"
                  inline: true
        status_code: 204