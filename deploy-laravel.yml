---
- name: Deploy Laravel App on EC2
  hosts: ec2
  become: yes

  vars:
    app_path: /var/www/laravel
    repo_url: https://github.com/laravel/laravel.git
    repo_branch: master
    ansible_remote_tmp: /tmp/.ansible/tmp
    project_name: "Laravel EC2"
    environment_name: "Production"
    discord_webhook_url: "{{ lookup('env', 'DISCORD_WEBHOOK_URL') }}"
    triggered_by: "DevOps Team"

  tasks:

    - name: Record deployment start time
      set_fact:
        deploy_start: "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }} UTC"

    - block:

        - name: Update apt cache
          apt:
            update_cache: yes

        - name: Install required packages
          apt:
            name:
              - apache2
              - git
              - php8.5
              - php8.5-cli
              - php8.5-mbstring
              - php8.5-xml
              - php8.5-curl
              - php8.5-mysql
              - php8.5-sqlite3
              - libapache2-mod-php8.5
              - composer
              - unzip
              - acl
            state: present

        - name: Mark laravel directory as safe for git
          command: git config --global --add safe.directory /var/www/laravel
          changed_when: false

        - name: Clone Laravel repo
          git:
            repo: "{{ repo_url }}"
            dest: "{{ app_path }}"
            version: "{{ repo_branch }}"
            force: yes

        - name: Set directory ownership
          file:
            path: "{{ app_path }}"
            owner: www-data
            group: www-data
            recurse: yes

        - name: Set storage and cache writable
          file:
            path: "{{ item }}"
            mode: "0775"
            recurse: yes
          loop:
            - "{{ app_path }}/storage"
            - "{{ app_path }}/bootstrap/cache"

        - name: Copy .env file
          copy:
            src: "{{ app_path }}/.env.example"
            dest: "{{ app_path }}/.env"
            remote_src: yes
            force: no

        - name: Install composer dependencies
          shell: composer install --no-interaction --prefer-dist
          args:
            chdir: "{{ app_path }}"
          environment:
            COMPOSER_ALLOW_SUPERUSER: "1"

        - name: Generate Laravel app key
          command: php artisan key:generate
          args:
            chdir: "{{ app_path }}"

        - name: Configure Apache virtual host
          copy:
            dest: /etc/apache2/sites-available/laravel.conf
            content: |
              <VirtualHost *:80>
                  ServerAdmin admin@localhost
                  DocumentRoot /var/www/laravel/public

                  <Directory /var/www/laravel/public>
                      AllowOverride All
                      Require all granted
                  </Directory>

                  ErrorLog ${APACHE_LOG_DIR}/laravel_error.log
                  CustomLog ${APACHE_LOG_DIR}/laravel_access.log combined
              </VirtualHost>

        - name: Enable Laravel site
          command: a2ensite laravel.conf

        - name: Enable mod_rewrite
          command: a2enmod rewrite

        - name: Disable default Apache site
          command: a2dissite 000-default.conf

        - name: Create SQLite database file
          file:
            path: "{{ app_path }}/database/database.sqlite"
            state: touch
            owner: www-data
            group: www-data
            mode: "0664"

        - name: Run Laravel migrations
          shell: php artisan migrate --force
          args:
            chdir: "{{ app_path }}"
          environment:
            COMPOSER_ALLOW_SUPERUSER: "1"

        - name: Restart Apache
          systemd:
            name: apache2
            state: restarted

        - name: Record deployment end time
          set_fact:
            deploy_end: "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }} UTC"

        - name: Send Discord success report
          uri:
            url: "{{ discord_webhook_url }}"
            method: POST
            body_format: json
            body:
              username: "Semaphore Release Automation"
              embeds:
                - title: "✅ Deployment Successful"
                  color: 3066993
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  fields:
                    - name: "📦 Project"
                      value: "{{ project_name }}"
                      inline: true
                    - name: "🌍 Environment"
                      value: "{{ environment_name }}"
                      inline: true
                    - name: "🌿 Branch"
                      value: "{{ repo_branch }}"
                      inline: true
                    - name: "🖥️ Server"
                      value: "{{ inventory_hostname }}"
                      inline: true
                    - name: "🐧 OS"
                      value: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
                      inline: true
                    - name: "👤 Triggered By"
                      value: "{{ triggered_by }}"
                      inline: true
                    - name: "🕐 Started"
                      value: "{{ deploy_start }}"
                      inline: true
                    - name: "🕑 Finished"
                      value: "{{ deploy_end }}"
                      inline: true
                  footer:
                    text: "Semaphore Ansible Automation • MintHRM DevOps"
            status_code: 204

      rescue:

        - name: Record failure time
          set_fact:
            deploy_end: "{{ now(utc=true, fmt='%Y-%m-%d %H:%M:%S') }} UTC"

        - name: Send Discord failure report
          uri:
            url: "{{ discord_webhook_url }}"
            method: POST
            body_format: json
            body:
              username: "Semaphore Release Automation"
              embeds:
                - title: "❌ Deployment FAILED"
                  color: 15158332
                  timestamp: "{{ ansible_date_time.iso8601 }}"
                  fields:
                    - name: "📦 Project"
                      value: "{{ project_name }}"
                      inline: true
                    - name: "🌍 Environment"
                      value: "{{ environment_name }}"
                      inline: true
                    - name: "🌿 Branch"
                      value: "{{ repo_branch }}"
                      inline: true
                    - name: "🖥️ Server"
                      value: "{{ inventory_hostname }}"
                      inline: true
                    - name: "🐧 OS"
                      value: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
                      inline: true
                    - name: "👤 Triggered By"
                      value: "{{ triggered_by }}"
                      inline: true
                    - name: "🕐 Started"
                      value: "{{ deploy_start }}"
                      inline: true
                    - name: "🕑 Failed At"
                      value: "{{ deploy_end }}"
                      inline: true
                    - name: "🚨 Action Required"
                      value: "Check Semaphore task logs immediately and rollback if needed"
                      inline: false
                  footer:
                    text: "Semaphore Ansible Automation • MintHRM DevOps"
            status_code: 204